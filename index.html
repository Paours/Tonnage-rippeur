<!DOCTYPE html>
<html lang="fr">
<head>

    <style>
        :root { 
            --primary: #2e7d32; 
            --secondary: #4caf50; 
            --background: #f5f5f5; 
            --text: #333; 
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--background); 
            color: var(--text); 
            margin: 0; 
            padding: 15px; 
        }
        .container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        h1 { 
            text-align: center; 
            color: var(--primary); 
            font-size: 24px; 
            margin-top: 0; 
        }
        .form-group { 
            margin-bottom: 15px; 
        }
        label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: bold; 
        }
        input, textarea, select { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px;

        }
        button:active {

        }
        .total-box { 
            background: #e8f5e9; 
            border-left: 5px solid var(--primary);

        }

            font-size: 18px; 
            border-bottom: 2px solid #eee; 
            padding-bottom: 5px; 
        }
        .history-list { 
            list-style: none; 
            padding: 0; 
            max-height: 350px; 
            overflow-y: auto; 
        }
        .history-item { 
            background: #f9f9f9; 
            padding: 10px; 
            margin-bottom: 8px; 
            border-radius: 6px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #eee; 
        }
        .history-details { 
            font-size: 13px; 
            color: #666; 
            margin-top: 3px; 
        }
        .badge-chauffeur {
            background: #e0e0e0;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            color: #444;
            display: inline-block;
            margin-bottom: 3px;
        }
        .delete-btn { 
            background: #c62828; 
            color: white; 
            border: none; 
            padding: 5px 10px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 12px;

        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Suivi Tonnage Général 🚛</h1>
    
    <div class="form-group">
        <label for="chauffeur">Nom du Chauffeur</label>
        <input type="text" id="chauffeur" placeholder="Ex: Jean / Thomas" required>
    </div>

    <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date">
    </div>
    
    <div class="form-group">
        <label for="tonnage">Tonnage (en tonnes)</label>
        <input type="number" id="tonnage" step="0.01" placeholder="Ex: 12.45" inputmode="decimal">
    </div>
    
    <div class="form-group">
        <label for="note">Commentaire / Tournée</label>
        <textarea id="note" rows="2" placeholder="Ex: Tournée Nord, Camion 4B"></textarea>
    </div>
    
    <button onclick="ajouterTonnage()">Enregistrer pour l'équipe</button>
    
    <div class="total-box">
        Total Cumulé Global : <span id="total-tonnage">0</span> t
    </div>
    
    <h2>Historique Équipe (En direct)</h2>
    <ul id="history" class="history-list">
        <li class="loading">Connexion à la base de données...</li>
    </ul>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    // CONFIGURATION SUPABASE (A REMPLIR AVEC VOS INFOS)
    const SUPABASE_URL = " https://xcncxagmsopmlryiklcm.supabase.co/rest/v1/"; 
    const SUPABASE_KEY = " sb_publishable_XY13fL2TWqDJWFaY6AhuAg_28V69Ov1";
    
    ```javascript
   const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    document.getElementById('date').valueAsDate = new Date();
    
    if(localStorage.getItem('nomChauffeur')) {
        document.getElementById('chauffeur').value = localStorage.getItem('nomChauffeur');
    }

    chargerDonneesEnDirect();

    async function chargerDonneesEnDirect() {
        const liste = document.getElementById('history');
        const totalSpan = document.getElementById('total-tonnage');
        
        let { data: tonnages, error } = await supabase
            .from('tonnages')
            .select('*')
            .order('id', { ascending: false });

        if (error) {
            liste.innerHTML = `<li class="loading" style="color:red;">Erreur de chargement...</li>`;
            console.error(error);
            return;
        }

        liste.innerHTML = '';
        let total = 0;

        if(tonnages.length === 0) {
            liste.innerHTML = '<li class="loading">Aucun tonnage enregistré pour le moment.</li>';
        }

        tonnages.forEach(item => {
            total += parseFloat(item.tonnage);
            
            const dateObj = new Date(item.date);
            const dateFormatee = dateObj.toLocaleDateString('fr-FR');

            const li = document.createElement('li');
            li.className = 'history-item';
            li.innerHTML = `
                <div>
                    <span class="badge-chauffeur">👤 ${item.chauffeur || 'Inconnu'}</span>
                    <div><strong>${dateFormatee} : ${item.tonnage} t</strong></div>
                    <div class="history-details">${item.note ? item.note : ''}</div>
                </div>
                <button class="delete-btn" onclick="supprimerEntree(${item.id})">X</button>
            `;
            liste.appendChild(li);
        });
        totalSpan.textContent = total.toFixed(2);
    }

    async function ajouterTonnage() {
        const chauffeurInput = document.getElementById('chauffeur').value.trim();
        const dateInput = document.getElementById('date').value;
        const tonnageInput = parseFloat(document.getElementById('tonnage').value);
        const noteInput = document.getElementById('note').value;

        if (!chauffeurInput || !dateInput || isNaN(tonnageInput)) { 
            alert("Veuillez remplir le nom, la date et le tonnage !"); 
            return; 
        }

        localStorage.setItem('nomChauffeur', chauffeurInput);

        const { error } = await supabase
            .from('tonnages')
            .insert([
                { chauffeur: chauffeurInput, date: dateInput, tonnage: tonnageInput, note: noteInput }
            ]);

        if (error) {
            alert("Erreur lors de l'enregistrement. Vérifiez votre connexion internet.");
            console.error(error);
            return;
        }
        
        document.getElementById('tonnage').value = '';
        document.getElementById('note').value = '';
        
        chargerDonneesEnDirect();
    }

    async function supprimerEntree(id) {
        if(confirm("Supprimer définitivement cette ligne pour TOUTE l'équipe ?")) {
            const { error } = await supabase
                .from('tonnages')
                .delete()
                .eq('id', id);

            if (error) {
                alert("Impossible de supprimer.");
                return;
            }
            chargerDonneesEnDirect();
        }
    }
</script>

</body>
</html>
