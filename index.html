<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi Tonnage Général</title>
    <link rel="manifest" href="manifest.json?v=9">
    <meta name="theme-color" content="#2e7d32">
    <style>
        :root { 
            --primary: #2e7d32; 
            --secondary: #4caf50; 
            --background: #f5f5f5; 
            --text: #333; 
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--background); 
            color: var(--text); 
            margin: 0; 
            padding: 10px; 
        }
        .container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: white; 
            padding: 15px; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            box-sizing: border-box;
        }
        h1 { 
            text-align: center; 
            color: var(--primary); 
            font-size: 22px; 
            margin-top: 0; 
        }
        
        /* Système d'onglets */
        .tabs {
            display: flex;
            margin-bottom: 15px;
            border-bottom: 2px solid #eee;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            font-size: 14px;
            font-weight: bold;
            color: #666;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            border-radius: 0;
            width: auto;
        }
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        .form-group { 
            margin-bottom: 12px; 
        }
        label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: bold; 
        }
        input, textarea { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        button:active { 
            background-color: var(--secondary); 
        }
        .total-box { 
            background: #e8f5e9; 
            border-left: 5px solid var(--primary); 
            padding: 10px; 
            margin: 10px 0; 
            border-radius: 0 8px 8px 0; 
            font-size: 16px; 
            font-weight: bold; 
        }
        .total-box.date-specific {
            background: #e3f2fd;
            border-left-color: #1e88e5;
        }
        .history-list { 
            list-style: none; 
            padding: 0; 
            max-height: 350px; 
            overflow-y: auto; 
        }
        .history-item { 
            background: #f9f9f9; 
            padding: 10px; 
            margin-bottom: 8px; 
            border-radius: 6px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #eee; 
        }
        .history-details { 
            font-size: 13px; 
            color: #666; 
        }
        .delete-btn { 
            background: #c62828; 
            color: white; 
            border: none; 
            padding: 5px 10px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 12px; 
            width: auto;
        }

        /* Style pour l'onglet Chauffeurs */
        .chauffeur-bloc {
            background: #f0f4f1;
            border: 1px solid #d0e2d2;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .chauffeur-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 16px;
            color: var(--primary);
            border-bottom: 1px solid #c8dcca;
            padding-bottom: 5px;
            margin-bottom: 8px;
        }
        .chauffeur-ligne {
            font-size: 14px;
            padding: 4px 0;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed #e0e0e0;
        }
        .chauffeur-ligne:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Suivi Tonnage Général 🚛</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="changerOnglet('saisir', event)">Saisir</button>
        <button class="tab-btn" onclick="changerOnglet('historique', event)">Historique</button>
        <button class="tab-btn" onclick="changerOnglet('chauffeurs', event)">Par Chauffeur</button>
    </div>

    <div id="tab-saisir" class="tab-content active">
        <div class="form-group">
            <label for="chauffeur">Nom du Chauffeur</label>
            <input type="text" id="chauffeur" placeholder="Ex: Remi">
        </div>

        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" onchange="calculerTotalDuJour()">
        </div>
        
        <div class="form-group">
            <label for="tonnage">Tonnage (en tonnes)</label>
            <input type="number" id="tonnage" step="0.01" placeholder="Ex: 12.45" inputmode="decimal">
        </div>
        
        <div class="form-group">
            <label for="note">Commentaire / Tournée</label>
            <textarea id="note" rows="2" placeholder="Ex: Tournée Nord, Camion 4B"></textarea>
        </div>
        
        <button onclick="ajouterTonnage()">Enregistrer la journée</button>
        
        <div class="total-box date-specific">
            Total pour le <span id="affichage-date-choisie">--/--/----</span> : <span id="total-tonnage-jour">0</span> t
        </div>
    </div>

    <div id="tab-historique" class="tab-content">
        <div class="total-box">
            Total Global : <span id="total-tonnage-hist">0</span> t
        </div>
        <ul id="history" class="history-list"></ul>
    </div>

    <div id="tab-chauffeurs" class="tab-content">
        <div id="listing-chauffeurs">
            </div>
    </div>
</div>

<script>
    const FIREBASE_URL = "https://tonnage-rippeurs-a4bb4-default-rtdb.firebaseio.com/";
    let toutesLesDonneesFirebase = [];

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    document.getElementById('date').valueAsDate = new Date();
    
    if(localStorage.getItem('dernierChauffeur')) {
        document.getElementById('chauffeur').value = localStorage.getItem('dernierChauffeur');
    }

    function changerOnglet(tabId, event) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        event.target.classList.add('active');
        document.getElementById(`tab-${tabId}`).classList.add('active');
    }

    recupererDonneesFirebase();

    function ajouterTonnage() {
        const chauffeurInput = document.getElementById('chauffeur').value.trim();
        const dateInput = document.getElementById('date').value;
        const tonnageInput = parseFloat(document.getElementById('tonnage').value);
        const noteInput = document.getElementById('note').value;

        if (!chauffeurInput || !dateInput || isNaN(tonnageInput)) { 
            alert("Veuillez remplir le nom, la date et le tonnage !"); 
            return; 
        }

        const dateObj = new Date(dateInput);
        const dateFormatee = dateObj.toLocaleDateString('fr-FR');

        const nouvelleEntree = { 
            chauffeur: chauffeurInput,
            date: dateFormatee, 
            rawDate: dateInput, 
            tonnage: tonnageInput, 
            note: noteInput 
        };

        fetch(`${FIREBASE_URL}/tonnages.json`, {
            method: 'POST',
            body: JSON.stringify(nouvelleEntree)
        })
        .then(response => {
            if(!response.ok) throw new Error();
            localStorage.setItem('dernierChauffeur', chauffeurInput);
            document.getElementById('tonnage').value = '';
            document.getElementById('note').value = '';
            recupererDonneesFirebase();
            alert("Enregistré avec succès !");
        })
        .catch(() => {
            alert("Erreur lors de l'enregistrement. Vérifiez votre connexion internet.");
        });
    }

    function supprimerEntree(firebaseId) {
        if(confirm("Supprimer cette ligne pour toute l'équipe ?")) {
            fetch(`${FIREBASE_URL}/tonnages/${firebaseId}.json`, {
                method: 'DELETE'
            })
            .then(() => recupererDonneesFirebase());
        }
    }

    function calculerTotalDuJour() {
        const dateSelectionnee = document.getElementById('date').value;
        const spanTotalJour = document.getElementById('total-tonnage-jour');
        const spanDateAffichage = document.getElementById('affichage-date-choisie');
        
        if (!dateSelectionnee) {
            spanTotalJour.textContent = "0";
            spanDateAffichage.textContent = "--/--/----";
            return;
        }

        const dateObj = new Date(dateSelectionnee);
        spanDateAffichage.textContent = dateObj.toLocaleDateString('fr-FR');

        let totalJour = 0;
        toutesLesDonneesFirebase.forEach(item => {
            if (item.rawDate === dateSelectionnee) {
                totalJour += item.tonnage;
            }
        });

        spanTotalJour.textContent = totalJour.toFixed(2);
    }

    function recupererDonneesFirebase() {
        fetch(`${FIREBASE_URL}/tonnages.json`)
        .then(res => res.json())
        .then(data => {
            const liste = document.getElementById('history');
            const totalHist = document.getElementById('total-tonnage-hist');
            const divChauffeurs = document.getElementById('listing-chauffeurs');
            
            liste.innerHTML = '';
            divChauffeurs.innerHTML = '';
            let totalGlobal = 0;

            if (!data) {
                toutesLesDonneesFirebase = [];
                const vide = '<li style="color:#666; font-style:italic; text-align:center; padding:10px;">Aucun tonnage enregistré.</li>';
                liste.innerHTML = vide;
                divChauffeurs.innerHTML = '<p style="color:#666; font-style:italic; text-align:center;">Aucune donnée par chauffeur.</p>';
                totalHist.textContent = "0";
                calculerTotalDuJour();
                return;
            }

            toutesLesDonneesFirebase = Object.keys(data).map(key => ({
                id: key,
                ...data[key]
            }));

            const listeTriee = [...toutesLesDonneesFirebase].sort((a, b) => new Date(b.rawDate) - new Date(a.rawDate));
            const donneesParChauffeur = {};

            listeTriee.forEach(item => {
                totalGlobal += item.tonnage;
                
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <div>
                        <strong>${item.date} - ${item.chauffeur} : ${item.tonnage} t</strong>
                        <div class="history-details">${item.note ? item.note : ''}</div>
                    </div>
                    <button class="delete-btn" onclick="supprimerEntree('${item.id}')">X</button>
                `;
                liste.appendChild(li);

                const nomChauffeur = item.chauffeur.toUpperCase();
                if (!donneesParChauffeur[nomChauffeur]) {
                    donneesParChauffeur[nomChauffeur] = {
                        total: 0,
                        tournees: []
                    };
                }
                donneesParChauffeur[nomChauffeur].total += item.tonnage;
                donneesParChauffeur[nomChauffeur].tournees.push(item);
            });

            totalHist.textContent = totalGlobal.toFixed(2);

            calculerTotalDuJour();

            Object.keys(donneesParChauffeur).sort().forEach(nom => {
                const bloc = document.createElement('div');
                bloc.className = 'chauffeur-bloc';
                
                let lignesHTML = '';
                donneesParChauffeur[nom].tournees.forEach(t => {
                    lignesHTML += `
                        <div class="chauffeur-ligne">
                            <span>📅 ${t.date} ${t.note ? `(${t.note})` : ''}</span>
                            <strong>${t.tonnage.toFixed(2)} t</strong>
                        </div>
                    `;
                });

                bloc.innerHTML = `
                    <div class="chauffeur-header">
                        <span>👤 ${nom}</span>
                        <span>Total : ${donneesParChauffeur[nom].total.toFixed(2)} t</span>
                    </div>
                    ${lignesHTML}
                `;
                divChauffeurs.appendChild(bloc);
            });
        })
        .catch(() => {
            console.log("Erreur de récupération.");
        });
    }
</script>
</body>
</html>
